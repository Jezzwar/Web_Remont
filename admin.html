<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Admina – Dnester</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1C3A2A; --green-dk: #0F2318; --gold: #C9A96E;
      --cream: #F8F6F1; --white: #fff; --text: #1A1A1A; --muted: #6B6B6B;
      --r: 8px; --red: #e53935; --ok: #43a047;
    }
    body { font-family: system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green-dk); }
    .login-box { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
    .login-box h1 { font-size: 1.4rem; color: var(--green-dk); margin-bottom: 6px; }
    .login-box p { color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: .75rem; font-weight: 700; color: var(--green-dk); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 7px; }
    .field input, .field select, .field textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #e0dbd2; border-radius: var(--r); font-size: .9rem; outline: none; font-family: inherit; transition: border-color .2s; background: white; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .btn { padding: 12px 24px; border: none; border-radius: var(--r); font-size: .85rem; font-weight: 700; cursor: pointer; transition: .2s; font-family: inherit; letter-spacing: .3px; }
    .btn-primary { background: var(--green-dk); color: white; width: 100%; }
    .btn-primary:hover { background: var(--green); }
    .btn-sm { padding: 6px 14px; font-size: .75rem; }
    .btn-approve { background: var(--ok); color: white; }
    .btn-approve:hover { background: #388e3c; }
    .btn-reject  { background: var(--red); color: white; }
    .btn-reject:hover  { background: #c62828; }
    .btn-grey    { background: #9e9e9e; color: white; }
    .btn-grey:hover    { background: #757575; }
    .btn-outline { background: none; border: 1.5px solid #ddd; color: var(--muted); }
    .btn-outline:hover { border-color: var(--gold); color: var(--green-dk); }
    .err { background: #ffebee; color: var(--red); padding: 11px 14px; border-radius: var(--r); font-size: .83rem; margin-bottom: 14px; display: none; }

    /* TOPBAR */
    .topbar { background: var(--green-dk); color: white; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 10; }
    .topbar h1 { font-size: .95rem; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-right span { font-size: .8rem; color: rgba(255,255,255,.55); }
    .btn-logout { background: none; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; border-radius: 6px; font-size: .75rem; cursor: pointer; transition: .2s; }
    .btn-logout:hover { background: var(--gold); color: var(--green-dk); }

    /* LAYOUT */
    .main { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }
    .tabs { display: flex; gap: 2px; margin-bottom: 28px; border-bottom: 2px solid #e0dbd2; }
    .tab-btn { padding: 11px 22px; background: none; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .2s; font-family: inherit; }
    .tab-btn.active { color: var(--green-dk); border-bottom-color: var(--gold); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* CARDS */
    .card { background: white; border-radius: var(--r); border: 1px solid #e8e3da; padding: 22px 24px; margin-bottom: 14px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .card-meta h3 { font-size: .95rem; font-weight: 700; color: var(--green-dk); }
    .card-meta span { font-size: .75rem; color: var(--muted); }
    .card-text { font-size: .88rem; line-height: 1.7; color: var(--text); margin-bottom: 14px; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .stars { color: var(--gold); font-size: .82rem; letter-spacing: 2px; }
    .badge { padding: 3px 10px; border-radius: 50px; font-size: .7rem; font-weight: 700; }
    .badge-pending  { background: #fff3e0; color: #e65100; }
    .badge-approved { background: #e8f5e9; color: #2e7d32; }
    .badge-rejected { background: #ffebee; color: #c62828; }
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: .88rem; }
    .section-lbl { font-size: 1rem; font-weight: 700; color: var(--green-dk); margin: 24px 0 14px; }

    /* GALLERY GRID */
    .gal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .gal-item { border-radius: var(--r); overflow: hidden; border: 2px solid #e0dbd2; transition: opacity .2s; }
    .gal-item.inactive { opacity: .4; }
    .gal-item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .gal-item-info { padding: 8px 12px; background: white; }
    .gal-item-info strong { font-size: .82rem; display: block; }
    .gal-item-info span { font-size: .72rem; color: var(--muted); }
    .gal-item-actions { display: flex; gap: 6px; padding: 7px 10px; background: white; border-top: 1px solid #f0ece4; }

    /* UPLOAD */
    .upload-box { background: white; border-radius: var(--r); border: 1px solid #e8e3da; padding: 24px; margin-bottom: 24px; }
    .upload-box h3 { font-size: .95rem; font-weight: 700; color: var(--green-dk); margin-bottom: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .file-label { display: block; padding: 11px 14px; border: 1.5px dashed var(--gold); border-radius: var(--r); text-align: center; cursor: pointer; font-size: .83rem; color: var(--muted); transition: background .2s; }
    .file-label:hover { background: #faf7f2; }
    .upload-status { margin-top: 10px; font-size: .82rem; color: var(--muted); }

    @media(max-width:640px) {
      .login-box { padding: 28px 20px; }
      .main { padding: 20px 14px; }
      .form-row { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>Panel Admina</h1>
    <p>Dnester – Remont-Naprawa</p>
    <div class="err" id="loginErr"></div>
    <div class="field"><label>E-mail</label><input type="email" id="loginEmail" placeholder="admin@email.pl"/></div>
    <div class="field"><label>Hasło</label><input type="password" id="loginPass" placeholder="••••••••"/></div>
    <button class="btn btn-primary" id="loginBtn">Zaloguj się</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="topbar">
    <h1>Panel Admina – Dnester</h1>
    <div class="topbar-right">
      <span id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Wyloguj</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="reviews">Opinie <span id="pendingBadge"></span></button>
      <button class="tab-btn" data-tab="gallery">Galeria</button>
    </div>

    <!-- REVIEWS TAB -->
    <div class="tab-pane active" id="tab-reviews">
      <div class="section-lbl">Oczekujące na weryfikację</div>
      <div id="pendingList"></div>
      <div class="section-lbl" style="margin-top:32px">Zatwierdzone opinie</div>
      <div id="approvedList"></div>
    </div>

    <!-- GALLERY TAB -->
    <div class="tab-pane" id="tab-gallery">
      <div class="upload-box">
        <h3>Dodaj nowe zdjęcie</h3>
        <div class="form-row" style="margin-bottom:14px">
          <div class="field" style="margin:0">
            <label>Kategoria</label>
            <select id="upCat">
              <option value="lazienka">Łazienka</option>
              <option value="kuchnia">Kuchnia</option>
              <option value="salon">Salon</option>
              <option value="rozne">Różne</option>
            </select>
          </div>
          <div class="field" style="margin:0">
            <label>Podpis</label>
            <input type="text" id="upLabel" placeholder="np. Łazienka po remoncie"/>
          </div>
        </div>
        <div class="field">
          <label>Plik zdjęcia</label>
          <input type="file" id="upFile" accept="image/*" style="display:none"/>
          <label for="upFile" class="file-label" id="fileLabel">Kliknij aby wybrać plik (JPG, PNG)</label>
        </div>
        <button class="btn btn-primary" id="upBtn" style="max-width:180px">Dodaj zdjęcie</button>
        <div class="upload-status" id="upStatus"></div>
      </div>

      <div class="section-lbl">Zdjęcia w galerii</div>
      <div class="gal-grid" id="galGrid"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── AUTH ──
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) showDashboard(session.user.email);
  })();

  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('loginBtn').addEventListener('click', login);

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.textContent = 'Błąd: ' + error.message; errEl.style.display = 'block'; }
    else showDashboard(data.user.email);
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginWrap').style.display = 'flex';
  });

  function showDashboard(email) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userEmail').textContent = email;
    loadReviews();
    loadGallery();
  }

  // ── TABS ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── REVIEWS ──
  async function loadReviews() {
    const { data, error } = await sb.from('reviews').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    const pending  = data.filter(r => r.status === 'pending');
    const approved = data.filter(r => r.status === 'approved');
    const badge = document.getElementById('pendingBadge');
    badge.textContent = pending.length ? `(${pending.length})` : '';
    renderReviews(pending,  document.getElementById('pendingList'),  true);
    renderReviews(approved, document.getElementById('approvedList'), false);
  }

  function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

  function renderReviews(list, el, isPending) {
    if (!list.length) { el.innerHTML = '<div class="empty">Brak opinii</div>'; return; }
    el.innerHTML = list.map(r => `
      <div class="card">
        <div class="card-header">
          <div class="card-meta">
            <h3>${esc(r.name)} <span style="font-weight:400">· ${esc(r.location || 'Warszawa')}</span></h3>
            <span>${new Date(r.created_at).toLocaleDateString('pl-PL')}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="stars">${stars(r.rating)}</span>
            <span class="badge badge-${r.status}">${r.status === 'pending' ? 'Oczekuje' : 'Zatwierdzona'}</span>
          </div>
        </div>
        <p class="card-text">${esc(r.text)}</p>
        <div class="card-actions">
          ${isPending ? `<button class="btn btn-sm btn-approve" onclick="setStatus('${r.id}','approved')">✓ Zatwierdź</button>` : ''}
          ${isPending ? `<button class="btn btn-sm btn-reject"  onclick="setStatus('${r.id}','rejected')">✕ Odrzuć</button>`  : ''}
          <button class="btn btn-sm btn-grey" onclick="delReview('${r.id}')">🗑 Usuń</button>
        </div>
      </div>`).join('');
  }

  async function setStatus(id, status) {
    await sb.from('reviews').update({ status }).eq('id', id);
    loadReviews();
  }
  async function delReview(id) {
    if (!confirm('Usunąć tę opinię?')) return;
    await sb.from('reviews').delete().eq('id', id);
    loadReviews();
  }

  // ── GALLERY ──
  async function loadGallery() {
    const { data, error } = await sb.from('gallery').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    const grid = document.getElementById('galGrid');
    if (!data.length) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Brak zdjęć. Dodaj pierwsze zdjęcie powyżej.</div>'; return; }
    grid.innerHTML = data.map(item => `
      <div class="gal-item ${item.active ? '' : 'inactive'}">
        <img src="${esc(item.src)}" alt="${esc(item.label)}" loading="lazy"/>
        <div class="gal-item-info">
          <strong>${esc(item.label)}</strong>
          <span>${esc(item.cat)}</span>
        </div>
        <div class="gal-item-actions">
          <button class="btn btn-sm ${item.active ? 'btn-reject' : 'btn-approve'}" onclick="toggleItem('${item.id}',${!item.active})">
            ${item.active ? 'Ukryj' : 'Pokaż'}
          </button>
          <button class="btn btn-sm btn-grey" onclick="delItem('${item.id}','${esc(item.src)}')">Usuń</button>
        </div>
      </div>`).join('');
  }

  async function toggleItem(id, active) {
    await sb.from('gallery').update({ active }).eq('id', id);
    loadGallery();
  }
  async function delItem(id, src) {
    if (!confirm('Usunąć to zdjęcie z galerii?')) return;
    if (src.includes('supabase')) {
      const path = src.split('/gallery/')[1];
      if (path) await sb.storage.from('gallery').remove([decodeURIComponent(path)]);
    }
    await sb.from('gallery').delete().eq('id', id);
    loadGallery();
  }

  // ── UPLOAD ──
  document.getElementById('upFile').addEventListener('change', e => {
    const f = e.target.files[0];
    document.getElementById('fileLabel').textContent = f ? f.name : 'Kliknij aby wybrać plik (JPG, PNG)';
  });

  document.getElementById('upBtn').addEventListener('click', async () => {
    const file  = document.getElementById('upFile').files[0];
    const cat   = document.getElementById('upCat').value;
    const label = document.getElementById('upLabel').value.trim() || { lazienka:'Łazienka', kuchnia:'Kuchnia', salon:'Salon', rozne:'Różne' }[cat];
    const status = document.getElementById('upStatus');
    if (!file) { status.textContent = '⚠️ Wybierz plik!'; return; }
    status.textContent = 'Przesyłanie...';
    document.getElementById('upBtn').disabled = true;

    const ext = file.name.split('.').pop().toLowerCase();
    const filename = `${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('gallery').upload(filename, file, { cacheControl: '3600' });
    if (upErr) { status.textContent = '❌ Błąd uploadu: ' + upErr.message; document.getElementById('upBtn').disabled = false; return; }

    const { data: urlData } = sb.storage.from('gallery').getPublicUrl(filename);
    const { error: dbErr } = await sb.from('gallery').insert({ src: urlData.publicUrl, cat, label, tall: false, active: true });
    if (dbErr) { status.textContent = '❌ Błąd zapisu: ' + dbErr.message; document.getElementById('upBtn').disabled = false; return; }

    status.textContent = '✅ Zdjęcie dodane!';
    document.getElementById('upFile').value = '';
    document.getElementById('fileLabel').textContent = 'Kliknij aby wybrać plik (JPG, PNG)';
    document.getElementById('upBtn').disabled = false;
    document.getElementById('upLabel').value = '';
    loadGallery();
    setTimeout(() => status.textContent = '', 3000);
  });
</script>
</body>
</html>
